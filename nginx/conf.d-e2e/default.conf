upstream e2e_local_devenv {
  server primo-explore-devenv:8003 fail_timeout=0;
}

upstream local_cdn {
  server cdn-server:3000 fail_timeout=0;
}

upstream exlibris {
  server nyu.primo.exlibrisgroup.com:443 fail_timeout=0;
}

server {
  listen 443 ssl http2;
  server_name e2e.nyu.primo.exlibrisgroup.com;

  root /usr/share/nginx/html;

  ssl_certificate     /nyu.primo.exlibrisgroup.com.crt;
  ssl_certificate_key /nyu.primo.exlibrisgroup.com.key;

  proxy_connect_timeout 60;
  proxy_read_timeout    60;
  proxy_send_timeout    60;

  client_max_body_size 4G;
  keepalive_timeout 10;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location ^~ /mng {
    try_files $uri @exl;
  }

  # Serve the chatwidget/statuspage embeds from the e2e app origin so Chromium
  # does not need any cross-origin or private-network exceptions in Docker.
  #
  # NOTE: These two locations intentionally proxy to the LIVE production CDN
  # (cdn.library.nyu.edu). Unlike /primo-customization/ assets, the embed
  # bundles (chatwidget-embed/index.min.js, statuspage-embed/index.min.js) are
  # built and deployed from a different repo and are NOT served by the local
  # `cdn-server`, so there is nothing local to point at. The chat-widget golden
  # HTML / screenshot tests also validate the real third-party widget output by
  # design (see e2e/tests/chat-widget.spec.js and statuspage-embed.spec.js).
  #
  # Trade-off: this couples the E2E suite to live prod infra, so a slow or
  # unavailable cdn.library.nyu.edu can cause CI flakiness. This is a known,
  # accepted dependency rather than an oversight.
  location ^~ /chatwidget-embed/ {
    proxy_pass https://cdn.library.nyu.edu;
    proxy_ssl_server_name on;
    proxy_set_header Host cdn.library.nyu.edu;
  }

  location ^~ /statuspage-embed/ {
    proxy_pass https://cdn.library.nyu.edu;
    proxy_ssl_server_name on;
    proxy_set_header Host cdn.library.nyu.edu;
  }

  location ~ ^/discovery/custom/[^/]+/js/custom\.js$ {
    proxy_pass http://e2e_local_devenv$uri$is_args$args;

    proxy_redirect off;
    proxy_intercept_errors on;
    include /etc/nginx/conf.d/includes/proxy-host-current.inc;
    include /etc/nginx/conf.d/includes/js-rewrites.inc;

    real_ip_header X-Real-IP;
  }

  location ~ ^(/primo-customization/[^/]+/css/)custom\.css$ {
    proxy_pass http://local_cdn$1external.css$is_args$args;
  }

  location ~ ^(/primo-customization/[^/]+/js/)custom\.js$ {
    proxy_pass http://local_cdn$1external.js$is_args$args;
    include /etc/nginx/conf.d/includes/js-rewrites.inc;
  }

  location ~ ^(/primo-customization/[^/]+/js/)external\.js$ {
    proxy_pass http://local_cdn$uri$is_args$args;
    include /etc/nginx/conf.d/includes/js-rewrites.inc;
  }

  location /primo-customization/ {
    proxy_pass http://local_cdn$uri$is_args$args;

    proxy_redirect off;
    proxy_intercept_errors on;
    include /etc/nginx/conf.d/includes/proxy-host-current.inc;
  }

  location / {
    try_files $uri @app;
  }

  location @exl {
    proxy_pass https://exlibris$uri$is_args$args;

    proxy_redirect off;
    proxy_intercept_errors on;
    proxy_ssl_server_name on;
    include /etc/nginx/conf.d/includes/proxy-host-exlibris.inc;
  }

  location @app {
    proxy_pass http://e2e_local_devenv$uri$is_args$args;

    proxy_redirect off;
    proxy_intercept_errors on;
    include /etc/nginx/conf.d/includes/proxy-host-current.inc;
    include /etc/nginx/conf.d/includes/proxy-upgrade.inc;

    real_ip_header X-Real-IP;
  }
}
