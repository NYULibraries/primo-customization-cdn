x-build-e2e: &x-build-e2e
  image: primo-customization-cdn-e2e
  build:
    context: ./
    dockerfile: e2e/Dockerfile
    cache_from:
      - primo-customization-cdn-e2e

x-environment: &x-environment
  VIEW: ${VIEW}

services:
  cdn-server:
    image: primo-customization-cdn-cdn-server
    build:
      dockerfile: Dockerfile.cdn-server
    ports:
      - "3000:3000"
    networks:
      - primo-customization-cdn-net
    # volumes:
    #   - ./primo-customization:/app/cdn/primo-customization
  #  NOTE: This service name `primo-explore-devenv` is hard-coded into the view packages' `getCdn()` code.
  #        https://github.com/NYULibraries/primo-customization/blob/ffadff7421a150d84271bcee3bcb9f37e6ccf678/docker-compose.yml?#L115-#L116
  #        If changing this name, make sure to update that reference.
  primo-explore-devenv:
    image: quay.io/nyulibraries/primo-customization-devenv:main
    ports:
      - "8003:8003"
    depends_on:
      - cdn-server
    environment:
      <<: *x-environment
    networks:
      primo-customization-cdn-net:
        aliases:
          - devenv

  e2e:
    <<: *x-build-e2e
    depends_on:
      e2e-tls:
        condition: service_healthy
    environment:
      <<: *x-environment
      PLAYWRIGHT_BASE_URL: https://e2e.nyu.primo.exlibrisgroup.com
    # https://playwright.dev/docs/ci#docker
    # CI configurations > Docker
    # "Using --ipc=host is also recommended when using Chromium. Without it Chromium can run out of memory and crash."
    ipc: host
    networks:
      - primo-customization-cdn-net
  e2e-update-golden-files:
    <<: *x-build-e2e
    depends_on:
      e2e-tls:
        condition: service_healthy
    environment:
      <<: *x-environment
      PLAYWRIGHT_BASE_URL: https://e2e.nyu.primo.exlibrisgroup.com
      UPDATE_GOLDEN_FILES: true
    ipc: host
    networks:
      - primo-customization-cdn-net
    # volumes:
    #   - ./e2e/tests/golden:/e2e/tests/golden
  e2e-update-screenshots:
    <<: *x-build-e2e
    depends_on:
      e2e-tls:
        condition: service_healthy
    command: ["yarn", "playwright", "test", "--update-snapshots"]
    environment:
      <<: *x-environment
      PLAYWRIGHT_BASE_URL: https://e2e.nyu.primo.exlibrisgroup.com
    ipc: host
    networks:
      - primo-customization-cdn-net
    # volumes:
    #   - ./e2e/tests/chat-widget.spec.js-snapshots/:/e2e/tests/chat-widget.spec.js-snapshots/

  e2e-tls:
    image: primo-customization-cdn-e2e-tls-nginx
    build:
      dockerfile: Dockerfile.nginx
    ports:
      - "444:443"
    # Allow non-root nginx to bind 443 inside the container.
    # Docker Compose sysctls: https://docs.docker.com/reference/compose-file/services/#sysctls
    # Linux kernel ip_unprivileged_port_start: https://www.kernel.org/doc/html/latest/networking/ip-sysctl.html
    sysctls:
      net.ipv4.ip_unprivileged_port_start: "0"
    depends_on:
      - primo-explore-devenv
      - cdn-server
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -ksf https://localhost/discovery/search -H 'Host: e2e.nyu.primo.exlibrisgroup.com'",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    extra_hosts:
      - "nyu.primo.exlibrisgroup.com:216.147.212.109"
    volumes:
      - ./nginx/conf.d-e2e:/etc/nginx/conf.d
    networks:
      primo-customization-cdn-net:
        aliases:
          - e2e.nyu.primo.exlibrisgroup.com

  # services for local tls, i.e. for login
  tls:
    image: primo-customization-cdn-tls-nginx
    build:
      dockerfile: Dockerfile.nginx
    ports:
      - "443:443"
    # Allow non-root nginx to bind 443 inside the container.
    # Docker Compose sysctls: https://docs.docker.com/reference/compose-file/services/#sysctls
    # Linux kernel ip_unprivileged_port_start: https://www.kernel.org/doc/html/latest/networking/ip-sysctl.html
    sysctls:
      net.ipv4.ip_unprivileged_port_start: "0"
    depends_on:
      - devenv-tls
      - cdn-server
    extra_hosts:
      - "nyu.primo.exlibrisgroup.com:216.147.212.109"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - primo-customization-cdn-net
  devenv-tls:
    image: quay.io/nyulibraries/primo-customization-devenv:main
    depends_on:
      - cdn-server
    extra_hosts:
      - "nyu.primo.exlibrisgroup.com:216.147.212.109"
    environment:
      <<: *x-environment
    networks:
      - primo-customization-cdn-net

networks:
  primo-customization-cdn-net:
    driver: bridge
